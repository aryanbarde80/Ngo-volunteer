<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Register - RSAI Squad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.06) 1px,transparent 1px);background-size:40px 40px;}
.bg-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);}
.card{position:relative;background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px;width:480px;box-shadow:0 24px 80px rgba(0,0,0,0.5);}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#e24b4a,#f97316);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:16px;font-weight:600;color:#fff;}
h2{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px;}
.subtitle{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);margin-bottom:5px;letter-spacing:0.05em;text-transform:uppercase;}
input,select{width:100%;padding:10px 13px;background:#0f1117;border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
input:focus,select:focus{border-color:#6366f1;}
input::placeholder{color:rgba(255,255,255,0.2);}
select option{background:#1a1d27;}
.otp-row{display:flex;gap:8px;}
.otp-row input{flex:1;}
.otp-btn{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#818cf8;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.otp-btn:hover{background:rgba(99,102,241,0.25);}
.otp-btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn{width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn:hover{background:#4f46e5;transform:translateY(-1px);}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none;}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;display:block;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;display:block;}
.link{text-align:center;margin-top:18px;font-size:13px;color:rgba(255,255,255,0.4);}
.link a{color:#818cf8;text-decoration:none;}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:18px 0;}
.section-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">❤</div>
    <div class="logo-text">RSAI Squad</div>
  </div>
  <h2>Volunteer Registration</h2>
  <div class="subtitle">Join the network and start making a difference</div>

  <div class="msg" id="msg"></div>

  <div class="section-label">Personal Info</div>
  <div class="grid2">
    <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="Rahul Verma"/></div>
    <div class="field"><label>Date of Birth</label><input type="date" id="dob"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="rahul@gmail.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
  </div>

  <hr class="divider">
  <div class="section-label">Contact & Verification</div>

  <div class="field">
    <label>Phone (with country code)</label>
    <div class="otp-row">
      <input type="tel" id="phone" placeholder="+917389503778"/>
      <button class="otp-btn" id="otp-btn" onclick="sendOtp()">Send OTP</button>
    </div>
  </div>
  <div class="field"><label>Enter OTP</label><input type="text" id="otp" placeholder="6-digit OTP"/></div>

  <hr class="divider">
  <div class="section-label">Volunteer Profile</div>
  <div class="grid2">
    <div class="field">
      <label>Skills</label>
      <select id="skills">
        <option value="">Select skill</option>
        <option>Food</option><option>Medical</option>
        <option>Shelter</option><option>Clothing</option>
        <option>Education</option><option>Relief</option>
        <option>Logistics</option>
      </select>
    </div>
    <div class="field">
      <label>Zone</label>
      <select id="zone">
        <option value="">Select zone</option>
        <option>North</option><option>South</option>
        <option>East</option><option>West</option>
      </select>
    </div>
  </div>

  <button class="btn" onclick="doRegister()">Create Account</button>
  <div class="link">Already registered? <a href="/">Sign in</a></div>
</div>

<script>
let otpTimer = 0;
function sendOtp() {
  const phone = document.getElementById('phone').value.trim();
  if (!phone.startsWith('+')) { showMsg('Phone must start with country code e.g. +91...', 'error'); return; }
  const btn = document.getElementById('otp-btn');
  btn.disabled = true;
  const params = new URLSearchParams({ phone });
  fetch('/auth/send-otp', { method: 'POST', body: params })
    .then(r => r.text())
    .then(() => {
      showMsg('OTP sent to ' + phone + ' via WhatsApp', 'success');
      let s = 30;
      const iv = setInterval(() => {
        btn.textContent = 'Resend (' + s + ')';
        s--;
        if (s < 0) { clearInterval(iv); btn.textContent = 'Send OTP'; btn.disabled = false; }
      }, 1000);
    })
    .catch(() => { showMsg('Failed to send OTP', 'error'); btn.disabled = false; });
}
function doRegister() {
  const phone = document.getElementById('phone').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const volunteer = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    phone: phone.startsWith('+') ? phone : '+91' + phone,
    dob: document.getElementById('dob').value,
    skills: document.getElementById('skills').value,
    zone: document.getElementById('zone').value
  };
  if (!volunteer.name || !volunteer.email || !volunteer.password || !volunteer.phone || !otp || !volunteer.skills || !volunteer.zone) {
    showMsg('Please fill all fields', 'error'); return;
  }
  fetch('/auth/register?otp=' + otp, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(volunteer)
  })
  .then(r => r.text())
  .then(res => {
    if (res === 'Registered') {
      showMsg('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/', 1800);
    } else { showMsg(res, 'error'); }
  })
  .catch(() => showMsg('Registration failed. Try again.', 'error'));
}
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
</script>
</body>
</html>
