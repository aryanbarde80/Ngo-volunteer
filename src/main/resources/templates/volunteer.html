<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Volunteers - RSAI Squad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0f1117;display:flex;min-height:100vh;color:#e2e8f0;}
.sidebar{width:220px;background:#13161f;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0;position:fixed;height:100vh;z-index:10;}
.logo{padding:20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#e24b4a,#f97316);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.logo-text{font-size:15px;font-weight:600;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace;letter-spacing:0.05em;}
nav{padding:12px 0;flex:1;}
.nav-section{font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:0.08em;text-transform:uppercase;padding:12px 18px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:rgba(255,255,255,0.45);font-size:13px;cursor:pointer;text-decoration:none;transition:all 0.15s;border-left:2px solid transparent;margin:1px 0;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8);}
.nav-item.active{background:rgba(99,102,241,0.12);color:#818cf8;border-left-color:#6366f1;}
.nav-item .icon{width:16px;text-align:center;font-size:14px;}
.nav-bottom{padding:16px 18px;border-top:1px solid rgba(255,255,255,0.06);}
.logout-btn{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.35);font-size:13px;cursor:pointer;text-decoration:none;transition:color 0.15s;}
.logout-btn:hover{color:#f87171;}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#13161f;border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:5;}
.search-wrap{flex:1;position:relative;}
.search{width:100%;padding:9px 12px 9px 14px;background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;}
.search:focus{border-color:#6366f1;}
.search::placeholder{color:rgba(255,255,255,0.2);}
.add-btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background 0.15s;}
.add-btn:hover{background:#4f46e5;}
.user-chip{display:flex;align-items:center;gap:10px;background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:6px 12px 6px 6px;}
.avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;}
.user-name{font-size:13px;font-weight:500;color:#fff;}
.user-role{font-size:11px;color:rgba(255,255,255,0.35);}
.content{padding:24px;}
.page-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px;}
.page-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:22px;}
.card{background:#1a1d27;border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:#fff;}
.vol-count{font-size:11px;background:rgba(99,102,241,0.15);color:#818cf8;padding:3px 8px;border-radius:20px;font-family:'DM Mono',monospace;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:0.06em;text-transform:uppercase;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);}
td{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;color:rgba(255,255,255,0.7);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.vol-name-cell{display:flex;align-items:center;gap:10px;}
.vol-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
.vol-name{font-size:13px;font-weight:500;color:#fff;}
.vol-email{font-size:11px;color:rgba(255,255,255,0.3);}
.skill-pill{display:inline-block;background:rgba(99,102,241,0.12);color:#818cf8;border:1px solid rgba(99,102,241,0.2);font-size:11px;padding:3px 8px;border-radius:5px;margin:1px;}
.zone-tag{font-size:12px;color:rgba(255,255,255,0.5);}
.status-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-block;}
.status-pill.AVAILABLE{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.2);}
.status-pill.BUSY{background:rgba(245,158,11,0.12);color:#fcd34d;border:1px solid rgba(245,158,11,0.2);}
.status-pill.UNAVAILABLE{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);}
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.25);font-size:13px;}
.colors{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.colors2{background:linear-gradient(135deg,#0ea5e9,#6366f1);}
.colors3{background:linear-gradient(135deg,#f97316,#ef4444);}
.colors4{background:linear-gradient(135deg,#10b981,#0ea5e9);}
.colors5{background:linear-gradient(135deg,#8b5cf6,#ec4899);}
.colors6{background:linear-gradient(135deg,#f59e0b,#f97316);}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">❤</div>
    <div>
      <div class="logo-text">RSAI Squad</div>
      <div class="logo-sub">ADMIN PANEL</div>
    </div>
  </div>
  <nav>
    <div class="nav-section">Main</div>
    <a class="nav-item" href="/dashboard"><span class="icon">⊞</span> Dashboard</a>
    <a class="nav-item active" href="/volunteer"><span class="icon">👥</span> Volunteers</a>
    <a class="nav-item" href="/upload-survey"><span class="icon">📤</span> Upload Survey</a>
    <div class="nav-section">System</div>
    <a class="nav-item" href="/admin"><span class="icon">⚙</span> Settings</a>
  </nav>
  <div class="nav-bottom">
    <a class="logout-btn" href="/logout" onclick="doLogout(event)">⬡ Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="search-wrap">
      <input class="search" type="text" placeholder="Search volunteers by name, skill, zone..." oninput="filterVols(this.value)"/>
    </div>
    <button class="add-btn" onclick="window.location.href='/register'">+ Add Volunteer</button>
    <div class="user-chip">
      <div class="avatar">AD</div>
      <div>
        <div class="user-name">Admin</div>
        <div class="user-role">Coordinator</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="page-title">Volunteers</div>
    <div class="page-sub">Manage all registered volunteers and their availability</div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">All Volunteers</span>
        <span class="vol-count" id="vol-count">0</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Skills</th>
            <th>Zone</th>
            <th>Phone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="vol-table">
          <tr><td colspan="5"><div class="empty-state">Loading volunteers...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allVols = [];
const colorClasses = ['colors','colors2','colors3','colors4','colors5','colors6'];

async function loadVolunteers() {
  try {
    const res = await fetch('/api/volunteers');
    allVols = await res.json();
    renderVols(allVols);
  } catch(e) {
    document.getElementById('vol-table').innerHTML = '<tr><td colspan="5"><div class="empty-state">Error loading volunteers</div></td></tr>';
  }
}

function renderVols(vols) {
  document.getElementById('vol-count').textContent = vols.length;
  const tbody = document.getElementById('vol-table');
  if (!vols.length) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No volunteers registered yet.<br><a href="/register" style="color:#818cf8;">Register first volunteer</a></div></td></tr>';
    return;
  }
  tbody.innerHTML = vols.map((v, i) => `
    <tr>
      <td>
        <div class="vol-name-cell">
          <div class="vol-avatar ${colorClasses[i % colorClasses.length]}">${(v.name||'?')[0].toUpperCase()}</div>
          <div>
            <div class="vol-name">${v.name || '—'}</div>
            <div class="vol-email">${v.email || '—'}</div>
          </div>
        </div>
      </td>
      <td>${v.skills ? v.skills.split(',').map(s => `<span class="skill-pill">${s.trim()}</span>`).join('') : '—'}</td>
      <td><span class="zone-tag">📍 ${v.zone || '—'}</span></td>
      <td><span style="font-family:'DM Mono',monospace;font-size:12px;">${v.phone || '—'}</span></td>
      <td><span class="status-pill ${v.status || 'AVAILABLE'}">${v.status || 'AVAILABLE'}</span></td>
    </tr>
  `).join('');
}

function filterVols(q) {
  if (!q) { renderVols(allVols); return; }
  const lq = q.toLowerCase();
  renderVols(allVols.filter(v =>
    (v.name||'').toLowerCase().includes(lq) ||
    (v.skills||'').toLowerCase().includes(lq) ||
    (v.zone||'').toLowerCase().includes(lq) ||
    (v.phone||'').includes(lq)
  ));
}

loadVolunteers();

function doLogout(e) {
    e.preventDefault();
    fetch('/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/')
        .catch(() => window.location.href = '/logout');
}
</script>
</body>
</html>
